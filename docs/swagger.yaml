basePath: /
definitions:
  body.ArgMetadata:
    properties:
      count:
        type: integer
      type:
        type: integer
    type: object
  body.BodyChunk:
    properties:
      argMetadata:
        items:
          $ref: '#/definitions/body.ArgMetadata'
        type: array
      arguments:
        items: {}
        type: array
      details: {}
      numberOfArguments:
        type: integer
      orderCode:
        type: integer
      orderName:
        type: string
      playerID:
        description: Starts at 2 for humans
        type: integer
      playerName:
        type: string
      timeCode:
        type: integer
    type: object
  header.GeneralsHeader:
    properties:
      buildDate:
        description: UTF-16 null-terminated (versionTimeString)
        type: string
      day:
        type: integer
      desync:
        description: 1 byte Bool
        type: boolean
      difficulty:
        description: int32 (GameDifficulty enum)
        type: integer
      dow:
        type: integer
      exeCRC:
        description: uint32
        type: integer
      frameCount:
        description: uint32
        type: integer
      gameType:
        description: '6 bytes: "GENREP"'
        type: string
      hour:
        type: integer
      iniCRC:
        description: uint32
        type: integer
      localPlayerIndex:
        description: ASCII null-terminated int
        type: integer
      maxFPS:
        description: int32
        type: integer
      metadata:
        allOf:
        - $ref: '#/definitions/header.Metadata'
        description: ASCII null-terminated (gameOptions)
      millisecond:
        type: integer
      minute:
        type: integer
      month:
        type: integer
      originalGameMode:
        description: int32
        type: integer
      playerDiscons:
        description: 8 × 1 byte Bool (MAX_SLOTS)
        items:
          type: boolean
        type: array
      quitEarly:
        description: 1 byte Bool
        type: boolean
      rankPoints:
        description: int32
        type: integer
      replayName:
        description: UTF-16 null-terminated
        type: string
      second:
        type: integer
      timeStampBegin:
        description: int32 (replay_time_t)
        type: integer
      timeStampEnd:
        description: int32 (replay_time_t)
        type: integer
      version:
        description: UTF-16 null-terminated
        type: string
      versionNumber:
        description: uint32
        type: integer
      year:
        description: SYSTEMTIME fields (8 × uint16)
        type: integer
    type: object
  header.Metadata:
    properties:
      crcInterval:
        description: C
        type: string
      mapCRC:
        description: MC (hex)
        type: string
      mapContentsMask:
        description: M prefix (2 hex digits)
        type: string
      mapPath:
        description: M remainder (map directory path)
        type: string
      mapSize:
        description: MS
        type: string
      oldFactionsOnly:
        description: 'O (ZH only: Y/N)'
        type: string
      players:
        description: S
        items:
          $ref: '#/definitions/header.Player'
        type: array
      seed:
        description: SD
        type: string
      startingCash:
        description: SC (ZH only)
        type: string
      superweaponRestriction:
        description: SR (ZH only)
        type: string
      useStats:
        description: 'US (ZH only: 1=yes, 0=no)'
        type: string
    type: object
  header.Player:
    properties:
      color:
        description: Color index (or name if ColorStore provided)
        type: string
      flags:
        description: 'Human: <accepted><hasMap> (e.g. "TT"); AI: difficulty (E/M/H)'
        type: string
      ip:
        description: Human only (hex)
        type: string
      name:
        description: Human only
        type: string
      natBehavior:
        description: 'Human only: firewall behavior type'
        type: string
      playerTemplate:
        description: Index into player template store
        type: string
      port:
        description: Human only
        type: string
      startingPosition:
        description: Start position (-1 = random)
        type: string
      team:
        description: Team number (-1 = none)
        type: string
      type:
        description: H=human, C=computer
        type: string
    type: object
  main.ErrorResponse:
    properties:
      details:
        example: underlying error message
        type: string
      error:
        example: Something went wrong
        type: string
    type: object
  main.StatsUploadResponse:
    properties:
      message:
        example: Stats stored successfully
        type: string
      seed:
        example: "12345"
        type: string
      size:
        example: 8192
        type: integer
    type: object
  object.ObjectSummary:
    properties:
      count:
        type: integer
      totalSpent:
        type: integer
    type: object
  statsfile.Academy:
    properties:
      clearedGarrisonedBuildings:
        type: integer
      controlGroupsUsed:
        type: integer
      doubleClickAttackMoveOrdersGiven:
        type: integer
      firestormsCreated:
        type: integer
      gatherersBuilt:
        type: integer
      generalsPointsSpent:
        type: integer
      guardAbilityUsedCount:
        type: integer
      heroesBuilt:
        type: integer
      minesCleared:
        type: integer
      peonsBuilt:
        type: integer
      salvageCollected:
        type: integer
      secondaryIncomeUnitsBuilt:
        type: integer
      specialPowersUsed:
        type: integer
      structuresCaptured:
        type: integer
      structuresGarrisoned:
        type: integer
      supplyCentersBuilt:
        type: integer
      upgradesPurchased:
        type: integer
      vehiclesDisguised:
        type: integer
    type: object
  statsfile.BattlePlanEvent:
    properties:
      bombardment:
        type: integer
      frame:
        type: integer
      holdTheLine:
        type: integer
      player:
        type: integer
      searchAndDestroy:
        type: integer
    type: object
  statsfile.DeathEvent:
    properties:
      frame:
        type: integer
      player:
        type: integer
    type: object
  statsfile.EnergyEvent:
    properties:
      consumption:
        type: integer
      frame:
        type: integer
      player:
        type: integer
      production:
        type: integer
    type: object
  statsfile.RadarEvent:
    properties:
      frame:
        type: integer
      hasRadar:
        type: boolean
      player:
        type: integer
    type: object
  statsfile.RankEvent:
    properties:
      frame:
        type: integer
      player:
        type: integer
      rankLevel:
        type: integer
    type: object
  statsfile.SciencePointsEvent:
    properties:
      frame:
        type: integer
      player:
        type: integer
      sciencePurchasePoints:
        type: integer
    type: object
  statsfile.SkillPointsEvent:
    properties:
      frame:
        type: integer
      player:
        type: integer
      skillPoints:
        type: integer
    type: object
  statsfile.TimeSeries:
    properties:
      players:
