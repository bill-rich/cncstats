      color:
        type: string
      faction:
        type: string
      index:
        type: integer
      money:
        type: integer
      moneyEarned:
        type: integer
      moneySpent:
        type: integer
      name:
        type: string
      playerType:
        type: string
      powersUsed:
        additionalProperties:
          type: integer
        type: object
      score:
        type: integer
      side:
        type: string
      team:
        type: integer
      unitsCreated:
