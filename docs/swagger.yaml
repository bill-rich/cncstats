host: localhost:8080
info:
  contact: {}
  description: Replay parser and stats API for Command & Conquer Generals / Zero Hour
  title: CNC Stats API
  version: "2.0"
paths:
  /player-money:
    get:
      description: Retrieve player money data with optional pagination.
      parameters:
      - description: Maximum number of records to return
        in: query
        name: limit
        type: integer
      - description: Number of records to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.PlayerMoneyListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List player money data
      tags:
      - player-money
    post:
      consumes:
      - application/json
      description: Store a new player money data snapshot.
      parameters:
      - description: Player money data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/database.MoneyDataRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create player money data
      tags:
      - player-money
  /player-money/{id}:
    delete:
      description: Delete a single player money data record by its ID.
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Delete player money data by ID
      tags:
      - player-money
    get:
      description: Retrieve a single player money data record by its ID.
      parameters:
      - description: Record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/database.PlayerMoneyData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get player money data by ID
      tags:
      - player-money
  /replay:
    post:
      consumes:
      - multipart/form-data
      description: Upload a .rep replay file and receive parsed replay data. Use format=v2
        to get enhanced stats if a matching stats file exists.
      parameters:
      - description: Replay file to parse
        in: formData
        name: file
        required: true
        type: file
      - description: Response format
        enum:
        - v2
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/zhreplay.EnhancedReplayV2'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Parse a replay file
      tags:
      - replay
  /stats:
    post:
      consumes:
      - application/octet-stream
      description: Receive gzip-compressed JSON stats from a Generals game and store
        them keyed by seed.
      parameters:
      - description: Game seed identifier
        in: header
        name: X-Game-Seed
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatsUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Upload game stats
      tags:
      - stats
swagger: "2.0"
