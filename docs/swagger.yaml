  zhreplay.TeamFactors:
    properties:
      builtValue:
        type: integer
      captureGain:
        type: integer
      captureLoss:
        type: integer
      destroyedValue:
        type: integer
      efficiency:
        type: number
      lostValue:
        type: integer
      moneyEarned:
        type: integer
      netAssets:
        type: integer
      playerScore:
        type: integer
      playersAlive:
        type: integer
      playersDead:
        type: integer
      recentIncome:
        type: integer
      score:
        type: number
    type: object
  zhreplay.WinEstimation:
    properties:
      agreeCount:
        description: how many factors pick the winner
        type: integer
      confidence:
        type: number
      teams:
        additionalProperties:
          $ref: '#/definitions/zhreplay.TeamFactors'
        type: object
      totalFactors:
        description: total active factors (3 or 4)
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Replay parser and stats API for Command & Conquer Generals / Zero Hour
  title: CNC Stats API
  version: "2.0"
paths:
  /replay:
    post:
      consumes:
      - multipart/form-data
      description: Upload a .rep replay file and receive parsed replay data. Returns
        enhanced v2 stats if a matching stats file exists, otherwise returns the basic
        parsed replay.
      parameters:
      - description: Replay file to parse
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/zhreplay.EnhancedReplayV2'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Parse a replay file
      tags:
      - replay
  /stats:
    post:
      consumes:
      - application/octet-stream
      description: Receive gzip-compressed JSON stats from a Generals game and store
        them keyed by seed.
      parameters:
      - description: Game seed identifier
        in: header
        name: X-Game-Seed
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.StatsUploadResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Upload game stats
      tags:
      - stats
swagger: "2.0"
